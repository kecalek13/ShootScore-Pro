kind = "web"
previewPath = "/"
title = "Shooting Competition Manager"
version = "1.0.0"
id = "artifacts/shooting-competition"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22793

[services.development]
run = "pnpm --filter @workspace/shooting-competition run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shooting-competition", "run", "build" ]
publicDir = "artifacts/shooting-competition/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22793"
BASE_PATH = "/"
